description=O Jakarta Data \u00e9 um modelo de programa\u00e7\u00e3o para acesso a dados. Voc\u00ea pode usar o Jakarta Data para representar dados por meio de objetos Java chamados entidades e para definir opera\u00e7\u00f5es sobre os dados como m\u00e9todos de uma interface de reposit\u00f3rio. Um provedor de dados Jakarta fornece a implementa\u00e7\u00e3o do reposit\u00f3rio para um aplicativo. O recurso " data-1.0 " inclui um provedor de dados Jakarta integrado para acesso a bancos de dados relacionais.
