description=Jakarta Data este un model de programare pentru accesul la date. Pute\u021bi utiliza Jakarta Data pentru a reprezenta datele prin obiecte Java numite entit\u0103\u021bi \u0219i pentru a defini opera\u021biuni asupra datelor ca metode ale unei interfe\u021be de depozit. Un furnizor de date din Jakarta asigur\u0103 implementarea bazei de date pentru o aplica\u021bie. Func\u021bia \u201e dataContainer-1.0 \u201d include doar interfe\u021bele din specifica\u021bia Jakarta Data 1.0. Func\u021bia \u201e dataContainer-1.0 \u201d nu include un furnizor de date Jakarta.
