#ISMESSAGEFILE FALSE
#NLS_ENCODING=UNICODE
#NLS_MESSAGEFORMAT_NONE

mpHealth=MicroProfile S\u0103n\u0103tate
mpHealth.desc=Configura\u021bie pentru MicroProfile S\u0103n\u0103tate.

checkInterval=Interval de actualizare a verific\u0103rii st\u0103rii de s\u0103n\u0103tate pe baz\u0103 de fi\u0219ier
checkInterval.desc=Valoarea pe care o specifica\u021bi stabile\u0219te intervalul la care verific\u0103rile de s\u0103n\u0103tate sunt interogate pentru verific\u0103rile de s\u0103n\u0103tate bazate pe fi\u0219iere. Valoarea este un num\u0103r urmat de o unitate de timp op\u021bional\u0103 ms pentru milisecunde sau s pentru secunde. Dac\u0103 nu este specificat\u0103 nicio unitate de timp, valoarea implicit\u0103 este \u00een secunde. Dac\u0103 valoarea este 0, 0s, 0ms sau este goal\u0103, atunci func\u021bia de verificare a st\u0103rii de s\u0103n\u0103tate bazat\u0103 pe fi\u0219iere este dezactivat\u0103.

startupCheckInterval=Interval de pornire a verific\u0103rii st\u0103rii de s\u0103n\u0103tate pe baz\u0103 de fi\u0219ier
startupCheckInterval.desc=Valoarea specificat\u0103 stabile\u0219te intervalul la care se efectueaz\u0103 verific\u0103rile de stare p\u00e2n\u0103 c\u00e2nd se confirm\u0103 starea \u201eUP\u201d \u0219i se creeaz\u0103 fi\u0219ierul de verificare a st\u0103rii. Specifica\u021bi valoarea sub form\u0103 de num\u0103r, urmat\u0103 op\u021bional de o unitate de timp: ms (milisecunde) sau s (secunde). Dac\u0103 nu specifica\u021bi unitatea de timp, valoarea implicit\u0103 este milisecundele. Dac\u0103 omite\u021bi complet valoarea, intervalul implicit este de 100 ms.

enableEndpoints=Activa\u021bi punctele finale de verificare a st\u0103rii de func\u021bionare
enableEndpoints.desc=Stabile\u0219te dac\u0103 punctele finale de verificare a st\u0103rii sunt activate. Aceast\u0103 setare se aplic\u0103 numai atunci c\u00e2nd sunt activate verific\u0103rile de stare bazate pe fi\u0219iere. Valoarea implicit\u0103 este true. Seta\u021bi aceast\u0103 valoare la \u201efalse\u201d pentru a dezactiva punctele de control \u00een cazul \u00een care sunt activate verific\u0103rile de stare bazate pe fi\u0219iere.
