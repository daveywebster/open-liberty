#ISMESSAGEFILE FALSE
#NLS_ENCODING=UNICODE
#NLS_MESSAGEFORMAT_NONE

mpHealth=MicroProfile Eg\u00e9szs\u00e9g
mpHealth.desc=Konfigur\u00e1ci\u00f3 a MicroProfile Health sz\u00e1m\u00e1ra.

checkInterval=F\u00e1jlalap\u00fa \u00e1llapotellen\u0151rz\u00e9s friss\u00edt\u00e9si id\u0151k\u00f6z
checkInterval.desc=A megadott \u00e9rt\u00e9k hat\u00e1rozza meg azt az intervallumot, amelyen bel\u00fcl a f\u00e1jlalap\u00fa \u00e1llapotellen\u0151rz\u00e9seket lek\u00e9rdezi. Az \u00e9rt\u00e9k egy sz\u00e1m, amelyet egy v\u00e1laszthat\u00f3 id\u0151egys\u00e9g k\u00f6vet: ms a milliszekundumok vagy s a m\u00e1sodpercek eset\u00e9ben. Ha nincs id\u0151egys\u00e9g megadva, az \u00e9rt\u00e9k alap\u00e9rtelmez\u00e9s szerint m\u00e1sodpercben van megadva. Ha az \u00e9rt\u00e9k 0, 0s, 0ms vagy \u00fcres, akkor a f\u00e1jlalap\u00fa \u00e1llapotellen\u0151rz\u00e9s funkci\u00f3 le van tiltva.

startupCheckInterval=F\u00e1jlalap\u00fa \u00e1llapotellen\u0151rz\u00e9s ind\u00edt\u00e1si id\u0151k\u00f6z
startupCheckInterval.desc=A megadott \u00e9rt\u00e9k hat\u00e1rozza meg azt az id\u0151k\u00f6z\u00f6t, amelyenk\u00e9nt az \u00e1llapotellen\u0151rz\u00e9sek lek\u00e9rdez\u00e9se megt\u00f6rt\u00e9nik, am\u00edg az \u201eUP\u201d \u00e1llapot meg nem jelenik, \u00e9s az \u00e1llapotellen\u0151rz\u00e9si f\u00e1jl l\u00e9tre nem j\u00f6n. Adja meg az \u00e9rt\u00e9ket sz\u00e1mk\u00e9nt, amely ut\u00e1n opcion\u00e1lisan megadhatja az id\u0151egys\u00e9get: ms (milliszekundum) vagy s (m\u00e1sodperc). Ha az id\u0151egys\u00e9get nem adja meg, az \u00e9rt\u00e9k alap\u00e9rtelmez\u00e9s szerint milliszekundum lesz. Ha az \u00e9rt\u00e9ket teljesen kihagyja, az alap\u00e9rtelmezett id\u0151k\u00f6z 100 ms.

enableEndpoints=Az \u00e1llapotellen\u0151rz\u00e9si v\u00e9gpontok enged\u00e9lyez\u00e9se
enableEndpoints.desc=Meghat\u00e1rozza, hogy az \u00e1llapotellen\u0151rz\u00e9si v\u00e9gpontok enged\u00e9lyezve vannak-e. Ez a be\u00e1ll\u00edt\u00e1s csak akkor l\u00e9p \u00e9rv\u00e9nybe, ha a f\u00e1jlalap\u00fa \u00e1llapotellen\u0151rz\u00e9s enged\u00e9lyezve van. Az alap\u00e9rtelmezett \u00e9rt\u00e9k igaz. \u00c1ll\u00edtsa ezt az \u00e9rt\u00e9ket false-ra a v\u00e9gpontok letilt\u00e1s\u00e1hoz, ha a f\u00e1jlalap\u00fa \u00e1llapotellen\u0151rz\u00e9s enged\u00e9lyezve van.
