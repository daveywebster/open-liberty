#ISMESSAGEFILE FALSE
#NLS_ENCODING=UNICODE
#NLS_MESSAGEFORMAT_NONE

mpHealth=MicroProfile Zdrav\u00ed
mpHealth.desc=Konfigurace pro MicroProfile Health.

checkInterval=Interval aktualizace kontroly stavu na z\u00e1klad\u011b soubor\u016f
checkInterval.desc=Zadan\u00e1 hodnota nastavuje interval, ve kter\u00e9m jsou kontroly stavu dotazov\u00e1ny pro kontroly stavu zalo\u017een\u00e9 na souborech. Hodnota je \u010d\u00edslo n\u00e1sledovan\u00e9 volitelnou jednotkou \u010dasu ms pro milisekundy nebo s pro sekundy. Pokud nen\u00ed zad\u00e1na \u017e\u00e1dn\u00e1 jednotka \u010dasu, je v\u00fdchoz\u00ed hodnota v sekund\u00e1ch. Pokud je hodnota 0, 0s, 0ms nebo je pr\u00e1zdn\u00e1, pak je funkce kontroly stavu na z\u00e1klad\u011b souboru zak\u00e1z\u00e1na.

startupCheckInterval=Interval spou\u0161t\u011bn\u00ed kontroly stavu na z\u00e1klad\u011b soubor\u016f
startupCheckInterval.desc=Zadan\u00e1 hodnota ur\u010duje interval, v jak\u00e9m se prov\u00e1d\u011bj\u00ed dotazy na stav, dokud nen\u00ed vy\u0159e\u0161en stav \u201eUP\u201c a nen\u00ed vytvo\u0159en soubor kontroly stavu. Zadejte hodnotu jako \u010d\u00edslo, za kter\u00fdm m\u016f\u017ee n\u00e1sledovat jednotka \u010dasu: ms (milisekundy) nebo s (sekundy). Pokud jednotku \u010dasu neuvedete, bude hodnota implicitn\u011b vyj\u00e1d\u0159ena v milisekund\u00e1ch. Pokud hodnotu zcela vynech\u00e1te, je v\u00fdchoz\u00ed interval 100 ms.

enableEndpoints=Povolit koncov\u00e9 body pro kontrolu stavu
enableEndpoints.desc=Ur\u010duje, zda jsou koncov\u00e9 body kontroly stavu povoleny. Toto nastaven\u00ed se projev\u00ed pouze v p\u0159\u00edpad\u011b, \u017ee jsou povoleny kontroly stavu na z\u00e1klad\u011b soubor\u016f. V\u00fdchoz\u00ed hodnota je true (ano). Nastavte tuto hodnotu na \u201efalse\u201c, chcete-li koncov\u00e9 body deaktivovat, pokud jsou povoleny kontroly stavu na z\u00e1klad\u011b soubor\u016f.
