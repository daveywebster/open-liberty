#ISMESSAGEFILE FALSE
#NLS_ENCODING=UNICODE
#NLS_MESSAGEFORMAT_NONE

mpHealth=MicroProfile Zdrowie
mpHealth.desc=Konfiguracja dla MicroProfile Health.

checkInterval=Interwa\u0142 aktualizacji kontroli kondycji opartej na plikach
checkInterval.desc=Okre\u015blona warto\u015b\u0107 ustawia interwa\u0142, w kt\u00f3rym odpytywane s\u0105 kontrole kondycji dla kontroli kondycji opartych na plikach. Warto\u015b\u0107 jest liczb\u0105, po kt\u00f3rej nast\u0119puje opcjonalna jednostka czasu ms dla milisekund lub s dla sekund. Je\u015bli nie okre\u015blono jednostki czasu, warto\u015b\u0107 domy\u015blnie podawana jest w sekundach. Je\u015bli warto\u015b\u0107 wynosi 0, 0s, 0ms lub jest pusta, funkcja sprawdzania kondycji na podstawie plik\u00f3w jest wy\u0142\u0105czona.

startupCheckInterval=Interwa\u0142 uruchamiania kontroli kondycji opartej na plikach
startupCheckInterval.desc=Podana warto\u015b\u0107 okre\u015bla cz\u0119stotliwo\u015b\u0107 sprawdzania stanu, dop\u00f3ki nie zostanie ustalony status \u201eUP\u201d i nie zostanie utworzony plik kontroli stanu. Warto\u015b\u0107 nale\u017cy poda\u0107 w postaci liczby, po kt\u00f3rej opcjonalnie mo\u017cna doda\u0107 jednostk\u0119 czasu: ms (milisekundy) lub s (sekundy). Je\u015bli nie podasz jednostki czasu, domy\u015bln\u0105 warto\u015bci\u0105 b\u0119d\u0105 milisekundy. Je\u015bli ca\u0142kowicie pominiesz t\u0119 warto\u015b\u0107, domy\u015blny interwa\u0142 wynosi 100 ms.

enableEndpoints=W\u0142\u0105cz punkty ko\u0144cowe sprawdzania stanu
enableEndpoints.desc=Okre\u015bla, czy punkty ko\u0144cowe sprawdzania stanu s\u0105 w\u0142\u0105czone. To ustawienie dzia\u0142a tylko wtedy, gdy w\u0142\u0105czono sprawdzanie stanu oparte na plikach. Domy\u015bln\u0105 warto\u015bci\u0105 jest true (prawda). Ustaw t\u0119 warto\u015b\u0107 na \u201efalse\u201d, aby wy\u0142\u0105czy\u0107 punkty ko\u0144cowe, je\u015bli w\u0142\u0105czono sprawdzanie poprawno\u015bci oparte na plikach.
