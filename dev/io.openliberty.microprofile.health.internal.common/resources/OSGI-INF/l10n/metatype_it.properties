#ISMESSAGEFILE FALSE
#NLS_ENCODING=UNICODE
#NLS_MESSAGEFORMAT_NONE

mpHealth=integrit\u00e0 microprofile
mpHealth.desc=Configurazione per un MicroProfile e Salute.

checkInterval=Intervallo di aggiornamento del controllo sanitario basato su file
checkInterval.desc=Il valore specificato imposta l'intervallo di tempo in cui i controlli sanitari vengono interrogati per i controlli sanitari basati sui file. Il valore \u00e8 un numero seguito da un'unit\u00e0 di tempo opzionale, ms per i millisecondi o s per i secondi. Se non viene specificata alcuna unit\u00e0 di tempo, il valore predefinito \u00e8 in secondi. Se il valore \u00e8 0, 0s, 0ms o \u00e8 vuoto, la funzione di controllo dello stato di salute basata sui file \u00e8 disattivata.

startupCheckInterval=Intervallo di avvio del controllo sanitario basato su file
startupCheckInterval.desc=Il valore specificato definisce l'intervallo con cui vengono eseguiti i controlli di integrit\u00e0 fino a quando non viene rilevato uno stato "UP" e non viene creato il file di controllo di integrit\u00e0. Specificare il valore sotto forma di numero, seguito facoltativamente da un'unit\u00e0 di misura del tempo: ms (millisecondi) o s (secondi). Se non si specifica l'unit\u00e0 di misura, il valore predefinito \u00e8 il millisecondo. Se si omette completamente il valore, l'intervallo predefinito \u00e8 di 100 ms.

enableEndpoints=Abilita gli endpoint di controllo dello stato
enableEndpoints.desc=Determina se gli endpoint di controllo dello stato sono abilitati. Questa impostazione ha effetto solo se sono abilitati i controlli di integrit\u00e0 basati sui file. Il valore predefinito \u00e8 true. Impostare questo valore su false per disabilitare gli endpoint se sono abilitati i controlli di integrit\u00e0 basati su file.
