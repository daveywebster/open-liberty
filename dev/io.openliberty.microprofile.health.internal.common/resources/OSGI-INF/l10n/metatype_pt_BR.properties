#ISMESSAGEFILE FALSE
#NLS_ENCODING=UNICODE
#NLS_MESSAGEFORMAT_NONE

mpHealth=funcionamento do microprofile
mpHealth.desc=Configura\u00e7\u00e3o para MicroProfile Health.

checkInterval=Intervalo de atualiza\u00e7\u00e3o da verifica\u00e7\u00e3o de integridade baseada em arquivo
checkInterval.desc=O valor especificado define o intervalo em que as verifica\u00e7\u00f5es de integridade s\u00e3o consultadas para as verifica\u00e7\u00f5es de integridade baseadas em arquivo. O valor \u00e9 um n\u00famero seguido de uma unidade de tempo opcional de ms para milissegundos ou s para segundos. Se nenhuma unidade de tempo for especificada, o valor ser\u00e1 em segundos por padr\u00e3o. Se o valor for 0, 0s, 0ms ou estiver vazio, a fun\u00e7\u00e3o de verifica\u00e7\u00e3o de integridade baseada em arquivo estar\u00e1 desativada.

startupCheckInterval=Intervalo de inicializa\u00e7\u00e3o da verifica\u00e7\u00e3o de integridade baseada em arquivo
startupCheckInterval.desc=O valor especificado define o intervalo em que as verifica\u00e7\u00f5es de integridade s\u00e3o consultadas at\u00e9 que um status "UP" seja obtido e o arquivo de verifica\u00e7\u00e3o de integridade seja criado. Especifique o valor como um n\u00famero, seguido opcionalmente de uma unidade de tempo: ms (milissegundos) ou s (segundos). Se voc\u00ea omitir a unidade de tempo, o valor padr\u00e3o ser\u00e1 milissegundos. Se voc\u00ea omitir completamente o valor, o intervalo padr\u00e3o ser\u00e1 de 100 ms.

enableEndpoints=Ativar pontos de verifica\u00e7\u00e3o de integridade
enableEndpoints.desc=Determina se os pontos de verifica\u00e7\u00e3o de integridade est\u00e3o ativados. Essa configura\u00e7\u00e3o s\u00f3 entra em vigor quando as verifica\u00e7\u00f5es de integridade baseadas em arquivos est\u00e3o ativadas. O valor padr\u00e3o \u00e9 true. Defina este valor como false para desativar os endpoints caso as verifica\u00e7\u00f5es de integridade baseadas em arquivo estejam ativadas.
