#ISMESSAGEFILE FALSE
#NLS_ENCODING=UNICODE
#NLS_MESSAGEFORMAT_NONE

mpHealth=estado de microprofile
mpHealth.desc=Configuraci\u00f3n para la salud e MicroProfile.

checkInterval=Intervalo de actualizaci\u00f3n del chequeo basado en ficheros
checkInterval.desc=El valor que especifique establece el intervalo en el que se consultan las comprobaciones de estado para las comprobaciones de estado basadas en archivos. El valor es un n\u00famero seguido de una unidad de tiempo opcional de ms para milisegundos o s para segundos. Si no se especifica ninguna unidad de tiempo, el valor por defecto es en segundos. Si el valor es 0, 0s, 0ms o est\u00e1 vac\u00edo, la funci\u00f3n de comprobaci\u00f3n de estado basada en archivos est\u00e1 desactivada.

startupCheckInterval=Intervalo de inicio del chequeo basado en archivos
startupCheckInterval.desc=El valor especificado establece el intervalo con el que se consultan las comprobaciones de estado hasta que se confirma el estado \u00abUP\u00bb y se crea el archivo de comprobaci\u00f3n de estado. Especifique el valor como un n\u00famero, seguido opcionalmente de una unidad de tiempo: ms (milisegundos) o s (segundos). Si no se indica la unidad de tiempo, el valor predeterminado es milisegundos. Si no se indica ning\u00fan valor, el intervalo predeterminado es de 100 ms.

enableEndpoints=Habilitar puntos finales de comprobaci\u00f3n de estado
enableEndpoints.desc=Determina si los puntos finales de comprobaci\u00f3n de estado est\u00e1n habilitados. Esta configuraci\u00f3n solo surte efecto cuando est\u00e1n habilitadas las comprobaciones de estado basadas en archivos. El valor predeterminado es\ntrue. Establece este valor en \u00abfalse\u00bb para desactivar los puntos de conexi\u00f3n si las comprobaciones de estado basadas en archivos est\u00e1n activadas.
