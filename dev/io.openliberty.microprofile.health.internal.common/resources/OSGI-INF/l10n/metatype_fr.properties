#ISMESSAGEFILE FALSE
#NLS_ENCODING=UNICODE
#NLS_MESSAGEFORMAT_NONE

mpHealth=int\u00e9grit\u00e9 de microprofile
mpHealth.desc=Configuration pour l' MicroProfile s Sant\u00e9.

checkInterval=Intervalle de mise \u00e0 jour du bilan de sant\u00e9 bas\u00e9 sur un fichier
checkInterval.desc=La valeur que vous indiquez d\u00e9finit l'intervalle auquel les contr\u00f4les de sant\u00e9 sont interrog\u00e9s pour les contr\u00f4les de sant\u00e9 bas\u00e9s sur les fichiers. La valeur est un nombre suivi d'une unit\u00e9 de temps facultative : ms pour les millisecondes ou s pour les secondes. Si aucune unit\u00e9 de temps n'est sp\u00e9cifi\u00e9e, la valeur est exprim\u00e9e en secondes par d\u00e9faut. Si la valeur est 0, 0s, 0ms ou vide, la fonction de contr\u00f4le de sant\u00e9 bas\u00e9 sur les fichiers est d\u00e9sactiv\u00e9e.

startupCheckInterval=Intervalle de d\u00e9marrage du bilan de sant\u00e9 bas\u00e9 sur les fichiers
startupCheckInterval.desc=La valeur indiqu\u00e9e d\u00e9finit l'intervalle auquel les contr\u00f4les d'int\u00e9grit\u00e9 sont interrog\u00e9s jusqu'\u00e0 ce qu'un \u00e9tat \u00ab UP \u00bb soit d\u00e9tect\u00e9 et que le fichier de contr\u00f4le d'int\u00e9grit\u00e9 soit cr\u00e9\u00e9. Indiquez la valeur sous forme de nombre, \u00e9ventuellement suivie d'une unit\u00e9 de temps : ms (millisecondes) ou s (secondes). Si vous n'indiquez pas d'unit\u00e9 de temps, la valeur par d\u00e9faut est la milliseconde. Si vous n'indiquez aucune valeur, l'intervalle par d\u00e9faut est de 100 ms.

enableEndpoints=Activer les points de terminaison de v\u00e9rification de l'\u00e9tat
enableEndpoints.desc=D\u00e9termine si les points de contr\u00f4le de l'\u00e9tat de sant\u00e9 sont activ\u00e9s. Ce param\u00e8tre ne s'applique que lorsque les contr\u00f4les d'int\u00e9grit\u00e9 bas\u00e9s sur des fichiers sont activ\u00e9s. La valeur par d\u00e9faut est true. D\u00e9finissez cette valeur sur \u00ab false \u00bb pour d\u00e9sactiver les points de terminaison si les contr\u00f4les d'int\u00e9grit\u00e9 bas\u00e9s sur des fichiers sont activ\u00e9s.
