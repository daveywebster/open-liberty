#ISMESSAGEFILE FALSE
#NLS_ENCODING=UNICODE
#NLS_MESSAGEFORMAT_NONE

mpHealth=MicroProfile-Status
mpHealth.desc=Konfiguration f\u00fcr MicroProfile Gesundheit.

checkInterval=Aktualisierungsintervall der dateibasierten Gesundheitspr\u00fcfung
checkInterval.desc=Der von Ihnen angegebene Wert legt das Intervall fest, in dem die Gesundheitspr\u00fcfungen f\u00fcr die dateibasierten Gesundheitspr\u00fcfungen abgefragt werden. Der Wert ist eine Zahl, gefolgt von einer optionalen Zeiteinheit von ms f\u00fcr Millisekunden oder s f\u00fcr Sekunden. Wenn keine Zeiteinheit angegeben wird, ist der Wert standardm\u00e4\u00dfig in Sekunden. Wenn der Wert 0, 0s, 0ms oder leer ist, ist die dateibasierte Gesundheitspr\u00fcfung deaktiviert.

startupCheckInterval=Startintervall der dateibasierten Gesundheitspr\u00fcfung
startupCheckInterval.desc=Der angegebene Wert legt das Intervall fest, in dem die Funktionspr\u00fcfungen abgefragt werden, bis ein \u201eUP\u201c-Status festgestellt und die Funktionspr\u00fcfungsdatei erstellt wird. Geben Sie den Wert als Zahl an, optional gefolgt von einer Zeiteinheit: ms (Millisekunden) oder s (Sekunden). Wenn Sie die Zeiteinheit weglassen, wird standardm\u00e4\u00dfig der Wert in Millisekunden verwendet. Wenn Sie den Wert ganz weglassen, betr\u00e4gt das Standardintervall 100 ms.

enableEndpoints=Endpunkte f\u00fcr den Zustandscheck aktivieren
enableEndpoints.desc=Legt fest, ob Endpunkte f\u00fcr den Gesundheitscheck aktiviert sind. Diese Einstellung wird nur wirksam, wenn dateibasierte Zustandspr\u00fcfungen aktiviert sind. Der Standardwert ist true. Setzen Sie diesen Wert auf \u201efalse\u201c, um die Endpunkte zu deaktivieren, wenn dateibasierte Zustandspr\u00fcfungen aktiviert sind.
